name: nvidia-gpu-fastapi
description: Use CUDA for inference on Nvidia GPUs
vendor: Canonical Ltd
grade: stable
devices:
  allof:
    - type: cpu
      architecture: amd64
    - type: gpu
      vendor-id: 0x10de # Nvidia Corporation
      vram: 16384M
memory: 30G
disk-space: 50G
components:
  - fastapi-server-interface
  - pytorch-cuda
  - model-openvla-7b-shard-1-of-4
  - model-openvla-7b-shard-2-of-4
  - model-openvla-7b-shard-3-of-4
  - model-openvla-7b-shard-4-of-4
